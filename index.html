<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <lotto-ticket></lotto-ticket>

        <section class="contact-section">
            <h3>제휴 문의</h3>
            <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
                <div class="form-group">
                    <label for="name">이름/회사명</label>
                    <input type="text" id="name" name="name" required placeholder="홍길동">
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="_replyto" required placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="문의 내용을 입력해주세요."></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>gemini
